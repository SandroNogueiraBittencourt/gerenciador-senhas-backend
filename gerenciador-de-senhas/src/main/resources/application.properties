spring.application.name=gerenciador-de-senhas

spring.datasource.url=jdbc:mariadb://localhost:3306/gerenciador_senhas
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Chave usada para criptografar/descriptografar as senhas cadastradas no cofre e o segredo MFA.
# Gere uma chave com: openssl rand -base64 32
# Não coloque a chave real no GitHub. Configure como variável de ambiente.
app.crypto.key=${NEXOVAULT_CRYPTO_KEY:}

# Chave usada para assinar tokens JWT.
# Gere uma chave com: openssl rand -base64 64
# Em produção, configure NEXOVAULT_JWT_SECRET como variável de ambiente.
app.jwt.secret=${NEXOVAULT_JWT_SECRET:}
app.jwt.access-exp-minutes=60
app.jwt.mfa-exp-minutes=5

# Nome exibido no aplicativo autenticador TOTP.
app.mfa.issuer=NexoVault

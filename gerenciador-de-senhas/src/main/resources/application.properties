spring.application.name=gerenciador-de-senhas

spring.datasource.url=jdbc:mariadb://localhost:3306/gerenciador_senhas
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Chave usada para criptografar/descriptografar as senhas cadastradas no cofre.
# Gere uma chave com: openssl rand -base64 32
# Não coloque a chave real no GitHub. Configure como variável de ambiente.
app.crypto.key=${NEXOVAULT_CRYPTO_KEY:}
